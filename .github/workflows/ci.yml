# CI Pipeline - Build, Test, Lint
# Runs on all PRs and pushes to main

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Node.js packages (shared + visuals)
  # ─────────────────────────────────────────────────────────────────────────────
  node-build:
    name: Node.js Build & Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npm run build

      - name: Run tests
        run: npm run test -- --coverage

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info
          flags: nodejs
          fail_ci_if_error: false

      - name: Lint
        run: npm run lint

  # ─────────────────────────────────────────────────────────────────────────────
  # .NET API
  # ─────────────────────────────────────────────────────────────────────────────
  dotnet-build:
    name: .NET Build & Test
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: apps/ai-query-api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal

  # ─────────────────────────────────────────────────────────────────────────────
  # Power BI Visual Packaging
  # ─────────────────────────────────────────────────────────────────────────────
  pbiviz-package:
    name: Package Power BI Visuals
    runs-on: ubuntu-latest
    needs: [node-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install pbiviz globally
        run: npm install -g powerbi-visuals-tools

      - name: Build packages
        run: npm run build

      - name: Package Production Gantt
        working-directory: packages/visual-production-gantt/pbiviz
        run: pbiviz package
        continue-on-error: true

      - name: Package Equipment Heatmap
        working-directory: packages/visual-equipment-heatmap/pbiviz
        run: pbiviz package
        continue-on-error: true

      - name: Package Safety KPI
        working-directory: packages/visual-safety-kpi/pbiviz
        run: pbiviz package
        continue-on-error: true

      - name: Package Ore Grade Waterfall
        working-directory: packages/visual-ore-grade-waterfall/pbiviz
        run: pbiviz package
        continue-on-error: true

      - name: Package Cost Tracker
        working-directory: packages/visual-cost-tracker/pbiviz
        run: pbiviz package
        continue-on-error: true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pbiviz-packages
          path: packages/**/dist/*.pbiviz
          if-no-files-found: warn
