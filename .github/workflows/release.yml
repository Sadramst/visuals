# Release Pipeline - Publish packages and create releases
# Triggered on version tags

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Build and Test
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test

  # ─────────────────────────────────────────────────────────────────────────────
  # Publish npm packages
  # ─────────────────────────────────────────────────────────────────────────────
  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish packages
        run: |
          npx lerna publish from-git --yes --no-private
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        continue-on-error: true

  # ─────────────────────────────────────────────────────────────────────────────
  # Package Power BI Visuals
  # ─────────────────────────────────────────────────────────────────────────────
  package-visuals:
    name: Package Visuals
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install pbiviz
        run: npm install -g powerbi-visuals-tools

      - name: Build
        run: npm run build

      - name: Package all visuals
        run: |
          for dir in packages/visual-*/pbiviz; do
            if [ -d "$dir" ]; then
              echo "Packaging $dir"
              cd "$dir"
              pbiviz package || true
              cd -
            fi
          done

      - name: Upload visual packages
        uses: actions/upload-artifact@v4
        with:
          name: pbiviz-packages-${{ github.ref_name }}
          path: packages/**/dist/*.pbiviz
          if-no-files-found: warn

  # ─────────────────────────────────────────────────────────────────────────────
  # Build .NET API Docker image
  # ─────────────────────────────────────────────────────────────────────────────
  build-api:
    name: Build API Image
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./apps/ai-query-api
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/ai-query-api:${{ steps.version.outputs.VERSION }}
            ghcr.io/${{ github.repository }}/ai-query-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────────────────────
  # Create GitHub Release
  # ─────────────────────────────────────────────────────────────────────────────
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [package-visuals, build-api]
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: pbiviz-packages-${{ github.ref_name }}
          path: ./artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: ./artifacts/**/*.pbiviz
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
